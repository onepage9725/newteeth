<head>

  <style>

      display: grid;
      place-items: center;
      font-family: "Noto Sans SC", sans-serif;
      background: #f6f7fb;
      color: #13056e;

    .card {

    p { color: #5f6480; }
    a {
      display: inline-block;
      margin-top: 12px;
      color: #fff;
      background: #d95130;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }
  </style>

<body>
  <div class="card">
    <h1>Payment Result</h1>
    <p>Billplz has redirected you back to the site.</p>
